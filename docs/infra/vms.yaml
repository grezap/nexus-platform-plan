# NexusPlatform VM inventory
# Canon — referenced by MASTER-PLAN §5.2. Every VM in the fleet is listed here.
# Source of truth for nexus-infra-vmware Terraform modules.

metadata:
  updated: 2026-04-21
  vm_count: 66          # 65 lab VMs + nexus-gateway (VM #0)
  host: 10.0.70.101
  hypervisor: VMware Workstation Pro 17.5+
  plan_version: v0.1.2

networks:
  vmnet10:
    mode: host-only
    cidr: 192.168.10.0/24
    dhcp: false
    host_ip: 192.168.10.1
    role: cluster-backplane
  vmnet11:
    mode: host-only   # Workstation Pro on Windows allows only one NAT slot (held by VMnet8); egress via nexus-gateway
    cidr: 192.168.70.0/24
    dhcp: { enabled: true, served_by: nexus-gateway, scope: "192.168.70.200-192.168.70.250", purpose: "Packer builds only" }
    host_ip: 192.168.70.254
    gateway: 192.168.70.1    # nexus-gateway VM (Debian 13 + nftables masquerade)
    role: mgmt+app+egress

clusters:

  edge:
    purpose: Internet egress, DHCP, DNS forwarder, NTP source for the lab
    phase: 0.B (built FIRST — before any other lab VM)
    nodes:
      - { name: nexus-gateway, os: deb13, vcpu: 1, ram_gb: 0.5, disk_gb: 4, bridged: true, vmnet10: 192.168.10.1, vmnet11: 192.168.70.1, dir: H:\VMS\NexusPlatform\00-edge\nexus-gateway, role: "Bridged NIC0 + VMnet11 NIC1 + VMnet10 NIC2; nftables masquerade; dnsmasq DHCP .200-.250 + DNS forwarder; chrony NTP" }

storage:
  active: H:\VMS\NexusPlatform
  cold: D:\VMS\NexusPlatform
  templates: H:\VMS\NexusPlatform\_templates

# IP convention (VMnet10 third octet = cluster role):
#   10.10.x — SQL Server        10.20.x — Kafka
#   10.30.x — StarRocks         10.40.x — ClickHouse
#   10.50.x — Percona           10.60.x — PostgreSQL
#   10.70.x — MongoDB           10.80.x — Redis
#   10.90.x — obs/platform      10.100.x — Swarm
#   10.110.x — Windows desktops 10.120.x — Spark/MinIO

